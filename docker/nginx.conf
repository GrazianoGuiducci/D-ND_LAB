# D-ND_LAB — nginx config for /data exposure
# Serves the lab's report directory + JSON state so AI crawlers and humans
# can read the latest cycle output.

server {
    listen 80;
    server_name _;

    # Default index — could be a static landing page in Phase 3
    location / {
        return 301 /data/reports/;
    }

    # Lab reports — markdown served as text/markdown, browsable index.
    # latest.md is a symlink updated at the end of each cycle (Phase 1).
    location /data/reports/ {
        alias /usr/share/nginx/html/data/reports/;
        autoindex on;
        autoindex_format html;
        default_type text/markdown;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
        add_header X-Content-Type-Options nosniff;
    }

    # Lab state JSON — seed, lab_data, lab_graph, cimitero
    location /data/ {
        alias /usr/share/nginx/html/data/;
        default_type application/json;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
    }

    # Health check
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
