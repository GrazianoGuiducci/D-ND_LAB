# D-ND_LAB — local + production deployment
# Phase 0 scaffold. Refined in Phase 3.
#
# Usage:
#   cp .env.example .env  &&  edit .env  &&  docker compose up -d
#
# Two services:
#   lab    — runs the cycle on schedule (cron-mode) or one-shot (default)
#   nginx  — serves /data/reports/ as static markdown for AI crawlers + humans

services:
  lab:
    build:
      context: .
      dockerfile: Dockerfile
    image: d-nd-lab:dev
    container_name: d-nd-lab
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - LAB_DATA_DIR=/data
    volumes:
      - lab_data:/data
      # Mount domains read-write so users can edit configs/contexts without rebuilding
      - ./domains:/app/domains:rw
    # Default CMD runs one cycle and exits. For cron mode override:
    # command: ["python", "-m", "core.cli", "schedule", "--domain", "${LAB_DOMAIN:-physics}"]
    healthcheck:
      test: ["CMD", "python", "-c", "import core; print('ok')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: d-nd-lab-nginx
    restart: unless-stopped
    ports:
      - "${LAB_HTTP_PORT:-8080}:80"
    volumes:
      - lab_data:/usr/share/nginx/html/data:ro
      # Custom config for autoindex on /data/reports/
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      lab:
        condition: service_healthy

volumes:
  lab_data:
    driver: local
