# D-ND_LAB — local + production deployment
#
# Quickstart:
#   cp .env.example .env
#   # edit .env: set LLM_API_KEY (required) + LLM_MODEL
#   docker compose up -d --build
#
# View latest report:
#   open http://localhost:8080/data/reports/
#
# Two services:
#   lab    — runs the cycle on schedule (cron-mode) or one-shot (default)
#   nginx  — serves /data/reports/ as static markdown for AI crawlers + humans

services:
  lab:
    build:
      context: .
      dockerfile: Dockerfile
    image: d-nd-lab:latest
    container_name: d-nd-lab
    restart: "no"  # default: one-shot cycle. Override to 'unless-stopped' for cron.
    env_file:
      - .env
    environment:
      # Container-internal data dir (override the user's host-side LAB_DATA_DIR
      # because the volume is mounted at /data inside the container)
      LAB_DATA_DIR: /data
    volumes:
      - lab_data:/data
      # Mount domains read-write so users can edit configs/contexts without
      # rebuilding the image. Comment out for production immutability.
      - ./domains:/app/domains:rw

  # Optional cron-mode service: starts cron daemon that triggers cycles on schedule.
  # Disabled by default. Enable with --profile cron:
  #   docker compose --profile cron up -d
  lab-cron:
    profiles: ["cron"]
    build:
      context: .
      dockerfile: Dockerfile
    image: d-nd-lab:latest
    container_name: d-nd-lab-cron
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LAB_DATA_DIR: /data
    volumes:
      - lab_data:/data
      - ./domains:/app/domains:rw
    # Custom command: read LAB_CRON_SCHEDULE and trigger cycles via cron daemon
    # The lab user runs `dndlab run` on schedule; tini stays as PID 1.
    entrypoint: ["tini", "--"]
    command:
      - sh
      - -c
      - |
        echo "${LAB_CRON_SCHEDULE:-30 3 * * *} python -m core.cli run --domain ${LAB_DOMAIN:-physics} >> /data/cron.log 2>&1" | crontab -
        crond -f -l 2

  # Web dashboard (FastAPI + single-page UI). Browser-friendly control
  # panel + chat with the lab in interactive mode. Default profile
  # disabled — start with --profile dashboard.
  dashboard:
    profiles: ["dashboard"]
    build:
      context: .
      dockerfile: Dockerfile
    image: d-nd-lab:latest
    container_name: d-nd-lab-dashboard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LAB_DATA_DIR: /data
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: 5000
      # Auth: set DASHBOARD_AUTH=enabled and use port mapping below to
      # restrict access (Phase 6 v1: localhost-only is the recommended
      # boundary — magic-link auth lands in Phase 6 v2).
    ports:
      - "${DASHBOARD_PORT:-5000}:5000"
    volumes:
      - lab_data:/data
      - ./domains:/app/domains:rw
      - ./dashboard:/app/dashboard:ro
    entrypoint: ["tini", "--"]
    command: ["python", "-m", "core.cli", "dashboard"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    container_name: d-nd-lab-nginx
    restart: unless-stopped
    ports:
      - "${LAB_HTTP_PORT:-8080}:80"
    volumes:
      - lab_data:/usr/share/nginx/html/data:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  lab_data:
    driver: local
