# MkDocs config for the D-ND_LAB documentation site.
#
# Build:  mkdocs build         (output to ./site/)
# Serve:  mkdocs serve         (live preview at http://127.0.0.1:8000)
# Deploy: mkdocs gh-deploy     (publishes to gh-pages branch)
#
# GitHub Pages will serve from the gh-pages branch automatically once
# the repo is public and Pages is enabled in repo settings.

site_name: D-ND_LAB
site_description: An autonomous research lab for any domain you can structure.
site_url: https://grazianoguiducci.github.io/D-ND_LAB/
repo_url: https://github.com/GrazianoGuiducci/D-ND_LAB
repo_name: GrazianoGuiducci/D-ND_LAB
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Architecture: architecture.md
  - Domains:
    - Overview: domains/index.md
    - Physics: domains/physics.md
    - Editorial: domains/editorial.md
    - Extending: domains/extending.md
  - Configuration: config.md
  - Roadmap: roadmap.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/GrazianoGuiducci/D-ND_LAB
    - icon: fontawesome/solid/globe
      link: https://d-nd.com
